name: CI/CD Pipeline (develop)

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker image build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:develop
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Deploy develop to EC2 with Docker and Redis
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_IMAGENAME: ${{ secrets.DOCKER_IMAGENAME }}
        run: |
          set -e
          trap 'rm -f private_key.pem' EXIT

          printf '%s\n' "$EC2_SSH_KEY" > private_key.pem
          sed -i 's/\r$//' private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            "${EC2_USERNAME}@${EC2_HOST}" bash -se <<EOF
          set -e

          IMAGE="${DOCKER_USERNAME}/${DOCKER_IMAGENAME}:develop"

          APP_CONTAINER_NAME="bookii-develop"
          REDIS_CONTAINER_NAME="bookii-redis-develop"
          NETWORK_NAME="bookii-develop-net"

          ENV_FILE="/home/${EC2_USERNAME}/develop/.env.develop"
          LOG_DIR="/home/${EC2_USERNAME}/logs/develop"

          mkdir -p "\$LOG_DIR"

          if [ ! -f "\$ENV_FILE" ]; then
            echo "ENV file not found: \$ENV_FILE"
            exit 1
          fi

          sudo docker network create "\$NETWORK_NAME" || true

          if ! sudo docker ps -a --format '{{.Names}}' | grep -Fxq "\$REDIS_CONTAINER_NAME"; then
            sudo docker run -d \
              --name "\$REDIS_CONTAINER_NAME" \
              --restart unless-stopped \
              --network "\$NETWORK_NAME" \
              redis:7-alpine
          else
            sudo docker start "\$REDIS_CONTAINER_NAME" || true
            sudo docker network connect "\$NETWORK_NAME" "\$REDIS_CONTAINER_NAME" || true
          fi

          sudo docker pull "\$IMAGE"

          sudo docker stop "\$APP_CONTAINER_NAME" || true
          sudo docker rm "\$APP_CONTAINER_NAME" || true

          sudo docker run -d \
            --name "\$APP_CONTAINER_NAME" \
            --restart unless-stopped \
            --network "\$NETWORK_NAME" \
            --env-file "\$ENV_FILE" \
            -p 8081:8080 \
            -v "\$LOG_DIR:/logs" \
            "\$IMAGE"

          sudo docker image prune -f

          echo "DEPLOY DONE"
          EOF
name: CI/CD Pipeline (main)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build -x test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookii-build
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: bookii-build
          path: build/libs/

      - name: Deploy to EC2 (prod)
        env:
          EC2_SSH_KEY: ${{ secrets.PROD_EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.PROD_EC2_USERNAME }}
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
        run: |
          set -e

          printf '%s\n' "$EC2_SSH_KEY" > private_key.pem
          sed -i 's/\r$//' private_key.pem
          chmod 600 private_key.pem

          jar_file=$(find build/libs -name '*.jar' ! -name '*plain.jar' | head -n 1)
          if [ -z "$jar_file" ]; then
            echo "No jar file found in build/libs"
            exit 1
          fi

          scp -i private_key.pem -o StrictHostKeyChecking=no "$jar_file" \
            "${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/prod/bookiiProd.jar"

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            "${EC2_USERNAME}@${EC2_HOST}" bash -se <<'EOF'
          set -e
          
          cleanup() { rm -f private_key.pem; }
          trap cleanup EXIT

          APP_JAR="/home/${USER}/prod/bookiiProd.jar"
          LOG_DIR="/home/${USER}/logs/prod"
          ENV_FILE="/home/${USER}/prod/.env.prod"

          mkdir -p "$LOG_DIR"

          if [ ! -f "$ENV_FILE" ]; then
            echo "ENV file not found: $ENV_FILE"
            exit 1
          fi

          pgrep -f "$APP_JAR" | xargs -r kill -15 || true
          sleep 10

          set -a
          . "$ENV_FILE"
          set +a

          nohup java -Duser.timezone=UTC -jar "$APP_JAR" > "$LOG_DIR/app.log" 2>&1 &

          echo "DEPLOY DONE"
          EOF
name: CI/CD Pipeline (main)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker image build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:prod-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:prod-latest
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy to EC2 with Docker and Redis
        env:
          EC2_SSH_KEY: ${{ secrets.PROD_EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.PROD_EC2_USERNAME }}
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_IMAGENAME: ${{ secrets.DOCKER_IMAGENAME }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          set -e
          trap 'rm -f private_key.pem' EXIT

          printf '%s\n' "$EC2_SSH_KEY" > private_key.pem
          sed -i 's/\r$//' private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            "${EC2_USERNAME}@${EC2_HOST}" bash -se <<EOF
          set -e

          IMAGE="${DOCKER_USERNAME}/${DOCKER_IMAGENAME}:${IMAGE_TAG}"

          APP_CONTAINER_NAME="bookii-prod"
          REDIS_CONTAINER_NAME="bookii-redis-prod"
          NETWORK_NAME="bookii-prod-net"

          ENV_FILE="/home/${EC2_USERNAME}/prod/.env.prod"
          LOG_DIR="/home/${EC2_USERNAME}/logs/prod"
          FIREBASE_CREDENTIALS_FILE="/home/${EC2_USERNAME}/bookiibookii-secrets/prod/firebase-service-account.json"

          mkdir -p "\$LOG_DIR"

          if [ ! -f "\$ENV_FILE" ]; then
            echo "ENV file not found: \$ENV_FILE"
            exit 1
          fi

          if [ ! -f "\$FIREBASE_CREDENTIALS_FILE" ]; then
            echo "Firebase credentials file not found: \$FIREBASE_CREDENTIALS_FILE"
            exit 1
          fi

          sudo docker network create "\$NETWORK_NAME" || true

          if ! sudo docker ps -a --format '{{.Names}}' | grep -Fxq "\$REDIS_CONTAINER_NAME"; then
            sudo docker run -d \
              --name "\$REDIS_CONTAINER_NAME" \
              --restart unless-stopped \
              --network "\$NETWORK_NAME" \
              --network-alias redis \
              -v bookii-redis-prod-data:/data \
              redis:7-alpine \
              redis-server --appendonly yes
          else
            sudo docker start "\$REDIS_CONTAINER_NAME" || true
            sudo docker network connect --alias redis "\$NETWORK_NAME" "\$REDIS_CONTAINER_NAME" || true
          fi

          PREVIOUS_IMAGE=\$(sudo docker inspect --format='{{.Config.Image}}' "\$APP_CONTAINER_NAME" 2>/dev/null || true)
          if [ -n "\$PREVIOUS_IMAGE" ]; then
            echo "Previous app image: \$PREVIOUS_IMAGE"
          else
            echo "Previous app image: none"
          fi
          echo "New app image: \$IMAGE"

          sudo docker pull "\$IMAGE"

          sudo docker stop "\$APP_CONTAINER_NAME" || true
          sudo docker rm "\$APP_CONTAINER_NAME" || true

          sudo docker run -d \
            --name "\$APP_CONTAINER_NAME" \
            --restart unless-stopped \
            --network "\$NETWORK_NAME" \
            --env-file "\$ENV_FILE" \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e REDIS_HOST=redis \
            -e FIREBASE_CREDENTIALS_PATH="\$FIREBASE_CREDENTIALS_FILE" \
            -p 8080:8080 \
            -v "\$LOG_DIR:/logs" \
            -v "\$FIREBASE_CREDENTIALS_FILE:\$FIREBASE_CREDENTIALS_FILE:ro" \
            "\$IMAGE"

          # After Nginx is introduced, prefer binding only to localhost:
          # -p 127.0.0.1:8080:8080
          for i in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "Health check passed"
              sudo docker image prune -f
              echo "DEPLOY DONE"
              exit 0
            fi
            echo "Waiting for app health check... (\$i/30)"
            sleep 2
          done

          echo "Health check failed"
          sudo docker logs "\$APP_CONTAINER_NAME" --tail=200 || true
          echo "Manual rollback image candidate: \$PREVIOUS_IMAGE"
          exit 1
          EOF

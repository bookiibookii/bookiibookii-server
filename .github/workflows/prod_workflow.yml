name: CI/CD Pipeline (main)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker image build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:prod-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:prod-latest
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: prod-deploy-main
      cancel-in-progress: false

    steps:
      - name: Deploy to EC2 with Docker and Redis
        env:
          EC2_SSH_KEY: ${{ secrets.PROD_EC2_SSH_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.PROD_EC2_KNOWN_HOSTS }}
          EC2_USERNAME: ${{ secrets.PROD_EC2_USERNAME }}
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_IMAGENAME: ${{ secrets.DOCKER_IMAGENAME }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          set -e
          trap 'rm -f private_key.pem known_hosts' EXIT

          if [ -z "$EC2_KNOWN_HOSTS" ]; then
            echo "PROD_EC2_KNOWN_HOSTS secret is required"
            exit 1
          fi

          printf '%s\n' "$EC2_SSH_KEY" > private_key.pem
          sed -i 's/\r$//' private_key.pem
          chmod 600 private_key.pem

          printf '%s\n' "$EC2_KNOWN_HOSTS" > known_hosts
          sed -i 's/\r$//' known_hosts
          chmod 600 known_hosts

          ssh -i private_key.pem \
            -o UserKnownHostsFile=known_hosts \
            -o StrictHostKeyChecking=yes \
            "${EC2_USERNAME}@${EC2_HOST}" bash -se <<EOF
          set -e

          IMAGE="${DOCKER_USERNAME}/${DOCKER_IMAGENAME}:${IMAGE_TAG}"

          APP_CONTAINER_NAME="bookii-prod"
          REDIS_CONTAINER_NAME="bookii-redis-prod"
          NETWORK_NAME="bookii-prod-net"

          ENV_FILE="/home/${EC2_USERNAME}/prod/.env.prod"
          LOG_DIR="/home/${EC2_USERNAME}/logs/prod"
          FIREBASE_CREDENTIALS_FILE="/home/${EC2_USERNAME}/bookiibookii-secrets/prod/firebase-service-account.json"

          mkdir -p "\$LOG_DIR"

          if [ ! -f "\$ENV_FILE" ]; then
            echo "ENV file not found: \$ENV_FILE"
            exit 1
          fi

          set -a
          . "\$ENV_FILE"
          set +a

          FIREBASE_ENABLED_VALUE="\${FIREBASE_ENABLED:-false}"
          FIREBASE_DOCKER_ARGS=()
          if [ "\$FIREBASE_ENABLED_VALUE" = "true" ]; then
            if [ ! -f "\$FIREBASE_CREDENTIALS_FILE" ]; then
              echo "Firebase credentials file not found: \$FIREBASE_CREDENTIALS_FILE"
              exit 1
            fi
            FIREBASE_DOCKER_ARGS=(
              -e "FIREBASE_CREDENTIALS_PATH=\$FIREBASE_CREDENTIALS_FILE"
              -v "\$FIREBASE_CREDENTIALS_FILE:\$FIREBASE_CREDENTIALS_FILE:ro"
            )
            echo "Firebase is enabled; credentials will be mounted"
          else
            echo "Firebase is disabled; credentials file is not required"
          fi

          start_app_container() {
            local image="\$1"

            sudo docker run -d \
              --name "\$APP_CONTAINER_NAME" \
              --restart unless-stopped \
              --network "\$NETWORK_NAME" \
              --env-file "\$ENV_FILE" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e REDIS_HOST=redis \
              -p 8080:8080 \
              -v "\$LOG_DIR:/logs" \
              "\${FIREBASE_DOCKER_ARGS[@]}" \
              "\$image"
          }

          wait_for_health() {
            local label="\$1"
            for i in \$(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
                echo "\$label health check passed"
                return 0
              fi
              echo "Waiting for \$label health check... (\$i/30)"
              sleep 2
            done
            return 1
          }

          sudo docker network create "\$NETWORK_NAME" || true

          if ! sudo docker ps -a --format '{{.Names}}' | grep -Fxq "\$REDIS_CONTAINER_NAME"; then
            sudo docker run -d \
              --name "\$REDIS_CONTAINER_NAME" \
              --restart unless-stopped \
              --network "\$NETWORK_NAME" \
              --network-alias redis \
              -v bookii-redis-prod-data:/data \
              redis:7-alpine \
              redis-server --appendonly yes
          else
            sudo docker start "\$REDIS_CONTAINER_NAME" || true
            sudo docker network connect --alias redis "\$NETWORK_NAME" "\$REDIS_CONTAINER_NAME" || true
          fi

          PREVIOUS_IMAGE=\$(sudo docker inspect --format='{{.Config.Image}}' "\$APP_CONTAINER_NAME" 2>/dev/null || true)
          if [ -n "\$PREVIOUS_IMAGE" ]; then
            echo "Previous app image: \$PREVIOUS_IMAGE"
          else
            echo "Previous app image: none"
          fi
          echo "New app image: \$IMAGE"

          sudo docker pull "\$IMAGE"

          sudo docker stop "\$APP_CONTAINER_NAME" || true
          sudo docker rm "\$APP_CONTAINER_NAME" || true

          start_app_container "\$IMAGE"

          # After Nginx is introduced, prefer binding only to localhost:
          # -p 127.0.0.1:8080:8080
          if wait_for_health "new app"; then
            sudo docker image prune -f
            echo "DEPLOY DONE"
            exit 0
          fi

          echo "Health check failed"
          sudo docker logs "\$APP_CONTAINER_NAME" --tail=200 || true

          # This is not zero-downtime deployment; rollback is best-effort recovery after a failed health check.
          if [ -z "\$PREVIOUS_IMAGE" ]; then
            echo "Rollback unavailable: previous image is unknown"
            exit 1
          fi

          echo "Rolling back to previous image: \$PREVIOUS_IMAGE"
          sudo docker stop "\$APP_CONTAINER_NAME" || true
          sudo docker rm "\$APP_CONTAINER_NAME" || true
          sudo docker pull "\$PREVIOUS_IMAGE" || true
          start_app_container "\$PREVIOUS_IMAGE"

          if wait_for_health "rollback app"; then
            echo "Rollback succeeded"
          else
            echo "Rollback failed"
            sudo docker logs "\$APP_CONTAINER_NAME" --tail=200 || true
          fi

          exit 1
          EOF
